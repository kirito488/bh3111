<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>崩坏3性格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            position: relative;
            padding: 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 0, 100, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0, 150, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 200, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: float 15s infinite;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            width: 100%;
            max-width: 1400px;
            position: relative;
        }

        .start-screen-content {
            position: relative;
            z-index: 10;
        }

        .honkai-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .honkai-icon {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.3), rgba(0, 150, 255, 0.3));
            border: 2px solid rgba(255, 0, 100, 0.5);
            animation: iconPulse 2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.4);
        }

        .honkai-icon:nth-child(1) { animation-delay: 0s; }
        .honkai-icon:nth-child(2) { animation-delay: 0.4s; }
        .honkai-icon:nth-child(3) { animation-delay: 0.8s; }
        .honkai-icon:nth-child(4) { animation-delay: 1.2s; }
        .honkai-icon:nth-child(5) { animation-delay: 1.6s; }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 0, 100, 0.4);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 30px rgba(255, 0, 100, 0.6);
            }
        }

        .title {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #ff0066 0%, #0096ff 50%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 20px;
            letter-spacing: 3px;
            position: relative;
            filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            animation: titleFlicker 4s ease-in-out infinite;
            text-transform: uppercase;
        }
        
        .title::after {
            content: '崩坏3性格测试';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            background: linear-gradient(135deg, #ff0066 0%, #0096ff 50%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(20px);
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes titleFlicker {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(255, 0, 100, 0.8)) drop-shadow(0 0 60px rgba(0, 150, 255, 0.4));
            }
        }

        .subtitle-container {
            margin-bottom: 45px;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #ff6699;
            margin-bottom: 10px;
            opacity: 0.95;
            text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
        }

        .subtitle-detail {
            font-size: 1.05rem;
            color: rgba(0, 150, 255, 0.8);
            margin-top: 10px;
            font-style: italic;
        }

        .start-btn {
            background: linear-gradient(135deg, #ff0066 0%, #0096ff 100%);
            border: 2px solid rgba(255, 0, 100, 0.6);
            padding: 20px 65px;
            font-size: 1.35rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.7),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 0, 100, 0.9);
        }

        .start-btn:active {
            transform: translateY(-2px) scale(1.01);
        }

        .start-screen-footer {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 0, 100, 0.3);
        }

        .footer-text {
            font-size: 0.9rem;
            color: rgba(255, 0, 100, 0.9);
            margin: 0;
            animation: textGlow 2s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
        }

        @keyframes textGlow {
            0%, 100% {
                opacity: 0.7;
                text-shadow: 0 0 10px rgba(255, 0, 100, 0.5);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 20px rgba(255, 0, 100, 0.8);
            }
        }

        .quiz-container {
            display: none;
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.08) 0%, rgba(0, 150, 255, 0.05) 100%);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 0, 100, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 0, 100, 0.2), 0 0 60px rgba(0, 150, 255, 0.1);
            width: 100%;
        }

        .quiz-header {
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #0096ff, #ff0066);
            background-size: 200% 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
            animation: shimmer 2s linear infinite;
            box-shadow: 0 0 10px rgba(255, 0, 100, 0.6);
        }
        
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .question-number {
            background: linear-gradient(135deg, #ff0066 0%, #0096ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.15rem;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .encouragement-text {
            color: rgba(0, 150, 255, 0.9);
            font-size: 0.95rem;
            font-style: italic;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        .question-text {
            color: #e8eef5;
            font-size: 1.45rem;
            margin-bottom: 40px;
            line-height: 1.7;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .option {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.1) 0%, rgba(0, 150, 255, 0.05) 100%);
            border: 2px solid rgba(255, 0, 100, 0.25);
            padding: 20px 22px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            color: #d4dce8;
            font-size: 1.1rem;
            min-height: 68px;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 100%;
            position: relative;
            overflow: visible;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .option:hover {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.2) 0%, rgba(255, 0, 100, 0.1) 100%);
            border-color: rgba(255, 0, 100, 0.6);
            transform: translateX(4px);
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.2);
        }

        .option:hover::before {
            left: 100%;
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.3) 0%, rgba(255, 0, 100, 0.15) 100%);
            border-color: #ff0066;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.3), inset 0 0 10px rgba(255, 0, 100, 0.1);
        }

        .option-letter {
            display: inline-block;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff0066, #0096ff);
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 40px;
            font-weight: bold;
            margin-right: 16px;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.5);
            border: 1px solid rgba(255, 0, 100, 0.4);
        }

        .option-feedback {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #ff0066, #0096ff);
            color: #fff;
            padding: 7px 14px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 10;
            animation: feedbackSlide 0.4s ease;
            box-shadow: 0 0 15px rgba(255, 0, 100, 0.5);
            white-space: nowrap;
        }

        @keyframes feedbackSlide {
            0% {
                opacity: 0;
                transform: translateY(-50%) translateX(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .nav-btn {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.15) 0%, rgba(0, 150, 255, 0.1) 100%);
            border: 2px solid rgba(255, 0, 100, 0.4);
            padding: 15px 42px;
            font-size: 1.05rem;
            font-weight: bold;
            color: #ff0066;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.25) 0%, rgba(255, 0, 100, 0.15) 100%);
            border-color: #ff0066;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.3);
        }

        .nav-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, #ff0066, #0096ff);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.4);
        }

        .nav-btn.primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5);
        }

        .fun-tip {
            color: rgba(0, 150, 255, 0.7);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 18px;
            padding: 10px;
            background: rgba(255, 0, 100, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 100, 0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-container {
            display: none;
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.1) 0%, rgba(0, 150, 255, 0.05) 100%);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 0, 100, 0.35);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.2), 0 0 80px rgba(0, 150, 255, 0.1);
            width: 100%;
        }

        .result-type {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #ff0066 0%, #0096ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: 3px;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }

        .result-character {
            font-size: 3.6rem;
            background: linear-gradient(135deg, #fff 0%, #ff0066 50%, #0096ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            font-weight: bold;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            animation: characterPulse 3s ease-in-out infinite;
        }

        @keyframes characterPulse {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 0, 100, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(255, 0, 100, 0.7));
            }
        }

        .personality-analysis {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.12) 0%, rgba(0, 150, 255, 0.06) 100%);
            border: 2px solid rgba(255, 0, 100, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: left;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.15);
        }

        .personality-analysis::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0066, transparent);
        }

        .personality-analysis-title {
            background: linear-gradient(135deg, #ff0066 0%, #0096ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
        }

        .personality-analysis-text {
            color: #d4dce8;
            font-size: 1.05rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        .character-intro {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.08) 0%, rgba(0, 150, 255, 0.04) 100%);
            border: 2px solid rgba(255, 0, 100, 0.25);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: left;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .character-intro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.6), transparent);
        }

        .character-intro-title {
            background: linear-gradient(135deg, #ff0066 0%, #0096ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .character-intro-text {
            color: #d4dce8;
            font-size: 1.15rem;
        }

        .character-traits {
            background: linear-gradient(135deg, rgba(255, 0, 100, 0.08) 0%, rgba(0, 150, 255, 0.04) 100%);
            border: 2px solid rgba(255, 0, 100, 0.25);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: left;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .character-traits::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 100, 0.6), transparent);
        }

        .character-traits-title {
            background: linear-gradient(135deg, #ff0066 0%, #0096ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.35rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .trait-item {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .trait-label {
            width: 140px;
            color: #d4dce8;
            font-weight: bold;
            font-size: 1.05rem;
        }

        .trait-bar-container {
            flex: 1;
            height: 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 0 15px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .trait-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff0066, #0096ff);
            border-radius: 6px;
            transition: width 1s ease;
            box-shadow: 0 0 8px rgba(255, 0, 100, 0.6);
        }

        .trait-value {
            width: 45px;
            text-align: right;
            color: #0096ff;
            font-weight: bold;
            font-size: 1rem;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff0066, #0096ff);
            border: 2px solid rgba(255, 0, 100, 0.5);
            padding: 18px 55px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.5),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .restart-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.6),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 0, 100, 0.8);
        }

        @media (max-width: 768px) {
            .container {
                padding: 18px;
            }

            .title {
                font-size: 2rem;
            }

            .quiz-container, .result-container {
                padding: 22px 18px;
            }

            .question-text {
                font-size: 1.15rem;
                margin-bottom: 28px;
            }

            .option {
                padding: 14px 16px;
                font-size: 0.92rem;
            }

            .nav-btn {
                padding: 11px 22px;
                font-size: 0.9rem;
            }

            .result-type {
                font-size: 1.15rem;
            }

            .result-character {
                font-size: 2.2rem;
            }

            .personality-analysis, .character-intro {
                padding: 18px;
            }

            .personality-analysis-title, .character-intro-title {
                font-size: 1.05rem;
            }

            .personality-analysis-text, .character-intro-text {
                font-size: 0.98rem;
            }

            .trait-item {
                flex-wrap: wrap;
            }

            .trait-label {
                width: 100px;
                font-size: 0.9rem;
            }

            .trait-bar-container {
                margin: 0 10px;
            }

            .trait-value {
                font-size: 0.9rem;
                width: 40px;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.7rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 0.98rem;
            }

            .subtitle-detail {
                font-size: 0.88rem;
            }

            .honkai-icons {
                gap: 10px;
                margin-bottom: 18px;
            }

            .honkai-icon {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }

            .start-btn {
                padding: 13px 35px;
                font-size: 1.05rem;
            }

            .start-screen-footer {
                margin-top: 35px;
                padding-top: 18px;
            }

            .footer-text {
                font-size: 0.82rem;
            }

            .result-character {
                font-size: 1.9rem;
            }

            .option {
                padding: 13px 15px;
                font-size: 0.9rem;
            }

            .option-letter {
                width: 30px;
                height: 30px;
                line-height: 30px;
                margin-right: 12px;
            }

            .encouragement-text {
                font-size: 0.78rem;
            }

            "梅比乌斯": "梅比乌斯是逐火之蛾的成员，性格高傲冷漠，有着丰富的知识和智慧。她是一名优秀的科学家，为了实现自己的目标不择手段。",
            "克莱因": "克莱因是逆熵的科学家，性格内向害羞，但在科学领域却有着卓越的成就。她总是默默地为团队贡献自己的力量。"

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(undefined);

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function startSurvey() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            currentQuestion = 0;
            answers = new Array(questions.length).fill(undefined);
            showQuestion();
        }

        function showQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-number').textContent = `问题 ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('question-text').textContent = question.text;
            
            const progressPercent = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progressPercent + '%';
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D', 'E'];
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option' + (answers[currentQuestion] === index ? ' selected' : '');
                optionDiv.innerHTML = `
                    <span class="option-letter">${letters[index]}</span>
                    <span class="option-content">${option}</span>
                `;
                if (answers[currentQuestion] === index) {
                    const feedback = document.createElement('span');
                    feedback.className = 'option-feedback';
                    feedback.textContent = '已选择';
                    optionDiv.appendChild(feedback);
                }
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });

            updateNavigationButtons();
            showEncouragement();
            showFunTip();
        }

        function selectOption(index) {
            answers[currentQuestion] = index;
            showQuestion();
        }

        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            prevBtn.disabled = currentQuestion === 0;
            
            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = '查看结果';
            } else {
                nextBtn.textContent = '下一题';
            }
        }

        function showEncouragement() {
            const encouragements = [
                "继续前进，女武神！",
                "你的选择决定了你的命运...",
                "崩坏的力量在你手中...",
                "相信自己的直觉...",
                "每一步都在接近真相...",
                "你的勇气正在被考验...",
                "队友的力量与你同在...",
                "胜利的光芒在前方..."
            ];
            const randomIndex = Math.floor(Math.random() * encouragements.length);
            document.getElementById('encouragement-text').textContent = encouragements[randomIndex];
        }

        function showFunTip() {
            const tips = [
                "💡 提示：凭直觉选择可能更准确哦~",
                "⚔️ 女武神的力量在你心中！",
                "🌟 每一个选择都很重要！",
                "🌸 相信自己的判断！",
                "⚡ 崩坏的战场在等待你！"
            ];
            const randomIndex = Math.floor(Math.random() * tips.length);
            document.getElementById('fun-tip').textContent = tips[randomIndex];
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function nextQuestion() {
            if (answers[currentQuestion] === undefined) {
                alert('请选择一个选项！');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                finishSurvey();
            }
        }

        function getCharacterTraits(character) {
            const traits = {
                "琪亚娜·卡斯兰娜": { 勇气: 95, 智慧: 75, 善良: 85, 独立: 80, 协作: 85 },
                "八重樱": { 勇气: 85, 智慧: 80, 善良: 90, 独立: 85, 协作: 75 },
                "符华": { 勇气: 90, 智慧: 90, 善良: 80, 独立: 95, 协作: 80 },
                "符华（班长）": { 勇气: 85, 智慧: 95, 善良: 85, 独立: 90, 协作: 85 },
                "德丽莎·阿波卡利斯": { 勇气: 80, 智慧: 95, 善良: 90, 独立: 75, 协作: 90 },
                "布洛妮娅·扎伊切克": { 勇气: 85, 智慧: 95, 善良: 80, 独立: 90, 协作: 85 },
                "希儿·芙乐艾": { 勇气: 80, 智慧: 85, 善良: 95, 独立: 85, 协作: 80 },
                "芽衣·雷电": { 勇气: 85, 智慧: 85, 善良: 95, 独立: 80, 协作: 90 },
                "丽塔·洛丝薇瑟": { 勇气: 90, 智慧: 90, 善良: 85, 独立: 85, 协作: 85 },
                "幽兰黛尔": { 勇气: 95, 智慧: 85, 善良: 85, 独立: 90, 协作: 90 },
                "卡莲·卡斯兰娜": { 勇气: 90, 智慧: 80, 善良: 95, 独立: 90, 协作: 75 },
                "帕朵菲莉丝": { 勇气: 85, 智慧: 75, 善良: 85, 独立: 95, 协作: 80 },
                "爱莉希雅": { 勇气: 90, 智慧: 85, 善良: 95, 独立: 80, 协作: 95 },
                "梅比乌斯": { 勇气: 85, 智慧: 95, 善良: 70, 独立: 95, 协作: 75 },
                "克莱因": { 勇气: 75, 智慧: 95, 善良: 90, 独立: 85, 协作: 85 }
            };
            return traits[character] || { 勇气: 50, 智慧: 50, 善良: 50, 独立: 50, 协作: 50 };
        }

        function finishSurvey() {
            const optionCounts = [0, 0, 0, 0, 0];
            
            for (let i = 0; i < questions.length; i++) {
                if (answers[i] !== undefined) {
                    optionCounts[answers[i]]++;
                }
            }
            
            let maxCount = -1;
            let maxIndex = 0;
            for (let i = 0; i < optionCounts.length; i++) {
                if (optionCounts[i] > maxCount) {
                    maxCount = optionCounts[i];
                    maxIndex = i;
                }
            }
            
            const type = typeMapping[maxIndex];
            const characters = charactersByType[type];
            const randomIndex = Math.floor(Math.random() * characters.length);
            const character = characters[randomIndex];
            const traits = getCharacterTraits(character);
            
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-type').textContent = type;
            document.getElementById('result-character').textContent = character;
            
            document.getElementById('personality-analysis').innerHTML = `
                <div class="personality-analysis-title">性格分析</div>
                <div class="personality-analysis-text">${personalityAnalysis[type]}</div>
            `;
            
            document.getElementById('character-intro').innerHTML = `
                <div class="character-intro-title">角色介绍 - ${character}</div>
                <div class="character-intro-text">${characterIntros[character]}</div>
            `;
            
            const traitsHTML = `
                <div class="character-traits-title">角色特质</div>
                ${Object.entries(traits).map(([trait, value]) => `
                    <div class="trait-item">
                        <span class="trait-label">${trait}</span>
                        <div class="trait-bar-container">
                            <div class="trait-bar" style="width: ${value}%"></div>
                        </div>
                        <span class="trait-value">${value}%</span>
                    </div>
                `).join('')}
            `;
            
            const traitsContainer = document.createElement('div');
            traitsContainer.className = 'character-traits';
            traitsContainer.innerHTML = traitsHTML;
            
            const resultScreen = document.getElementById('result-screen');
            if (resultScreen) {
                resultScreen.appendChild(traitsContainer);
            }
        }

        createParticles();
    </script>
